# Mosquitto MQTT 브로커 설정 - 워터닉스 IoT 시스템

# 기본 리스너 (비암호화 - 내부망)
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket 리스너
listener 9001
protocol websockets

# TLS 리스너 (외부 게이트웨이용)
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false

# 영구 저장
persistence true
persistence_location /mosquitto/data/

# 로깅
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# 메시지 크기 제한 (100KB)
message_size_limit 102400

# Keep-alive
keepalive_interval 60
